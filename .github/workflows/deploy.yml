name: Build & Deploy (ECR + ECS)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:   us-east-1
  TF_VERSION:   1.9.0
  PROJECT_NAME: ecs-nginx-demo   # musí odpovídat terraform.tfvars

jobs:
  # ============================================================
  # JOB 1 – Build Docker image a push do ECR
  # ============================================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    environment: devops

    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      ecr_url:   ${{ steps.ecr_url.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # Přihlášení do ECR
      - name: Login to Amazon ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      # Sestavíme image tag z git SHA (prvních 7 znaků) + "latest"
      - name: Set image metadata
        id: meta
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${SHA}" >> $GITHUB_OUTPUT
          echo "Image tag: ${SHA}"

      # ECR URL = <account>.dkr.ecr.<region>.amazonaws.com/<repo>
      - name: Get ECR URL
        id: ecr_url
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          URL="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT_NAME }}"
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "ECR URL: ${URL}"

      # Build a push: tagujeme SHA i latest
      - name: Build & Push Docker image
        run: |
          ECR="${{ steps.ecr_url.outputs.url }}"
          TAG="${{ steps.meta.outputs.tag }}"

          docker build \
            --tag "${ECR}:${TAG}" \
            --tag "${ECR}:latest" \
            .

          docker push "${ECR}:${TAG}"
          docker push "${ECR}:latest"

          echo "✅ Pushed ${ECR}:${TAG} and ${ECR}:latest"

  # ============================================================
  # JOB 2 – Terraform deploy (závisí na úspěšném docker jobu)
  # ============================================================
  terraform:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: docker                          # spustí se až po docker jobu
    environment: devops
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate -no-color

      # Terraform Apply – přepíšeme image_tag na konkrétní SHA z docker jobu
      - name: Terraform Apply
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            -var="image_tag=${{ needs.docker.outputs.image_tag }}"

      - name: Show outputs
        run: |
          echo "### 🚀 Deployment dokončen" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Output | Hodnota |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          LB=$(terraform output -raw load_balancer_url)
          ECR=$(terraform output -raw ecr_repository_url)
          echo "| ALB URL | $LB |" >> $GITHUB_STEP_SUMMARY
          echo "| ECR URL | $ECR |" >> $GITHUB_STEP_SUMMARY
          echo "| Image tag | ${{ needs.docker.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY

      # Počkáme než ECS service nastartuje a otestujeme
      - name: Wait for ECS to stabilize
        run: sleep 90

      - name: Test Application
        run: |
          URL=$(terraform output -raw load_balancer_url)
          echo "Testuji: $URL"
          for i in {1..10}; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$HTTP" = "200" ]; then
              echo "✅ HTTP 200 – aplikace běží!"
              exit 0
            fi
            echo "Pokus $i: HTTP $HTTP – čekám 30 s..."
            sleep 30
          done
          echo "❌ Aplikace neodpovídá."
          exit 1
